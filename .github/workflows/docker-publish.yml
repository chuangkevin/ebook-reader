name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose*.yml'
      - '.github/workflows/*.yml'
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: kevin950805

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/readflix-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push Backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/readflix-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "## Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ env.DOCKERHUB_USERNAME }}/readflix-frontend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ env.DOCKERHUB_USERNAME }}/readflix-backend:latest\`" >> $GITHUB_STEP_SUMMARY
