services:
  frontend:
    image: kevin950805/readflix-frontend:latest
    container_name: ebook-reader-frontend
    restart: unless-stopped
    ports:
      - "7123:80"
    depends_on:
      - backend

  backend:
    image: kevin950805/readflix-backend:latest
    container_name: ebook-reader-backend
    restart: unless-stopped
    ports:
      - "4003:4003"
    volumes:
      - ebook-reader-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ebook-reader-data:
